name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - app/**

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/hello-world:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/hello-world:${{ github.sha }}

      - name: Update image tag in values.yaml
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|" helm/hello-world/values.yaml

      - name: Commit and push updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/hello-world/values.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push
